# ╔══════════════════════════════════════════╗
# ║  tmux.conf — Compact Divider Style       ║
# ╚══════════════════════════════════════════╝

set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"

# ── Core ───────────────────────────────────
set -g escape-time       0
set -g history-limit     50000
set -g focus-events      on
set -g display-time      1500
set -g status-interval   5
set -g renumber-windows  on

# ── Mouse ──────────────────────────────────
set -g mouse on

# ── Base index from 1 ──────────────────────
set -g base-index        1
set -g pane-base-index   1
set-window-option -g pane-base-index 1

# ── Prefix: C-Space ────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ══════════════════════════════════════════
#  KEY BINDINGS
# ══════════════════════════════════════════

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Smart splits — inherit current path
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable with prefix held)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window cycling
bind -r C-h previous-window
bind -r C-l next-window

# Move windows left / right
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Zoom toggle
bind z resize-pane -Z

# Toggle synchronize-panes with status feedback
bind S set-window-option synchronize-panes \; \
  display "Sync panes: #{?synchronize-panes,ON,OFF}"

# Popup scratchpad — floating terminal (prefix + t)
bind t display-popup -E -w 80% -h 75% \
  "tmux new-session -A -s scratch"

# ── Copy mode (vi keys) ───────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel

# ══════════════════════════════════════════
#  PANE BORDERS
# ══════════════════════════════════════════

set -g pane-border-style        "fg=colour238"
set -g pane-active-border-style "fg=colour69"
set -g pane-border-lines        single

# ══════════════════════════════════════════
#  STATUS BAR — DIVIDER STYLE
# ══════════════════════════════════════════
#
#  Palette
#  ───────
#  bg       colour234   base background  (#1c1c26-ish)
#  chrome   colour236   slightly raised
#  divider  colour238   subtle │ separators
#  dim      colour240   indexes, de-emphasized
#  muted    colour245   secondary text
#  fg       colour252   primary text
#  blue     colour69    accent  (#5f87ff)
#  cyan     colour81    info    (#5fd7ff)
#  green    colour114   ok      (#87d787)
#  yellow   colour185   warn    (#d7d75f)
#  orange   colour209   alert   (#ff875f)
#  red      colour203   error   (#ff5f5f)

set -g status on
set -g status-position  bottom
set -g status-justify   left
set -g status-style     "bg=colour234,fg=colour245"

set -g status-left-length   40
set -g status-right-length  110

# ── Left: session name ────────────────────
#  session-name │ windows …
set -g status-left \
  "#[fg=colour114,bold]  #[fg=colour238,nobold]│"

# ── Window list ───────────────────────────
#  │ placed between every adjacent window — uniform dividers, equal spacing
setw -g window-status-separator "#[bg=colour234,fg=colour238]│"

# Inactive: dim index, dim name; red ! only on bell (activity flag dropped —
#   nvim redraws constantly and would keep it permanently orange)
setw -g window-status-format \
  "#[bg=colour234,fg=colour240] #I #[fg=colour244]#W#{?window_bell_flag,#[fg=colour203]!,}#[fg=colour244] "

# Active: dim index, bright bold name; cyan Z tag when pane is zoomed
setw -g window-status-current-format \
  "#[bg=colour234,fg=colour240] #I #[fg=colour252,bold]#W#{?window_zoomed_flag,#[fg=colour81,nobold] Z,}#[fg=colour252,nobold] "

# ── Right: indicators │ user │ cpu │ mem ──
#
#  PREFIX — lights up when prefix key is held
#  SYNC   — lights up when panes are synchronized
#  user   — current unix user          (cyan)
#  cpu    — CPU usage % from /proc/stat  (green)
#  mem    — RAM usage % from free        (lavender)
set -g status-right \
"#{?client_prefix,#[fg=colour203,bold] PREFIX #[fg=colour238,nobold]│,}\
#{?pane_synchronized,#[fg=colour114,bold] SYNC #[fg=colour238,nobold]│,}\
#[fg=colour81]  #(whoami) \
#[fg=colour238]│ #[fg=colour114]󰻠 #[bold]#(awk '/^cpu /{u=$2+$4;t=$2+$3+$4+$5;print int(u/t*100)}' /proc/stat)%#[nobold] \
#[fg=colour238]│ #[fg=colour141]󰧑 #[bold]#(free | awk '/^Mem/{print int($3/$2*100)}')%#[nobold] "

# ── Message / command prompt ──────────────
set -g message-style         "bg=colour234,fg=colour69,bold"
set -g message-command-style "bg=colour234,fg=colour245"

# ── Selection highlight ───────────────────
set -g mode-style "bg=colour69,fg=colour234"

# ══════════════════════════════════════════
#  WINDOW OPTIONS
# ══════════════════════════════════════════

set -g automatic-rename        on
set -g automatic-rename-format "#{pane_current_command}"
set -g monitor-activity        on
set -g visual-activity         off
set -g monitor-bell            on
set -g visual-bell             off
set -g bell-action             other

# ══════════════════════════════════════════
#  PLUGINS
# ══════════════════════════════════════════

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'
